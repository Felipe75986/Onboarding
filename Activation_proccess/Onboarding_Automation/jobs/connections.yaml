- name: connections
  description: 'Phase 2 - Read Delivery CSV and create cable connections in NetBox sandbox.'
  loglevel: INFO
  executionEnabled: true
  scheduleEnabled: false
  options:
    - name: DELIVERY
      description: 'Delivery CSV exported from Google Sheets (File -> Download -> Comma Separated Values, with the Delivery tab active)'
      required: true
      type: file
    - name: NETBOXTOKEN
      description: 'NetBox API token (pulled from Key Storage)'
      required: true
      secure: true
      storagePath: keys/project/activation-pipeline/netbox-token
      valueExposed: true
    - name: CHASSIS_NAME
      description: 'Optional - if cabling chassis-mode devices, set this to the chassis name (e.g., S941605X5C06289). Leave blank for individual servers.'
  sequence:
    keepgoing: false
    strategy: node-first
    commands:
      - script: |
          #!/bin/bash
          set +e
          cd /scripts/Onboarding_Automation
          python3 run_connections.py
          EXIT=$?
          echo ""
          echo "===== Last 80 lines of FileLogger output ====="
          LOG_FILE="logs/$(date +%Y-%m-%d)_system.log"
          if [ -f "$LOG_FILE" ]; then
              tail -80 "$LOG_FILE"
          else
              echo "(no log file at $LOG_FILE)"
          fi
          exit $EXIT
